name: CI/CD DevOps

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hola-mundo-devops:latest .

      - name: Push a Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/hola-mundo-devops:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy en Render
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d7lv8jpo3t8c73f6ntt0?key=sXQhaQso6NE"
